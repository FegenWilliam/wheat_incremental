<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheat Incremental 0.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Wheat Incremental Game</h1>

    <section class="stats">
      <div class="stat">
        <span class="stat-label">Turn</span>
        <span class="stat-value"><span id="current-turn">1</span> / <span id="turn-limit">80</span></span>
      </div>
      <div class="stat">
        <span class="stat-label">Wheat</span>
        <span class="stat-value" id="wheat-stat"><span id="wheat-amount">0</span> / <span id="wheat-cap">200</span></span>
      </div>
      <div class="stat">
        <span class="stat-label">Money</span>
        <span class="stat-value">$<span id="money-amount">0</span></span>
      </div>
      <div class="stat">
        <span class="stat-label">Per Turn</span>
        <span class="stat-value">+<span id="wheat-per-turn">10</span></span>
      </div>
      <button id="pass-turn" type="button">Pass Turn</button>
    </section>
    <p id="turn-message" class="turn-message"></p>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="buildings" type="button">Buildings</button>
      <button class="tab-btn" data-tab="workers" type="button">Workers</button>
      <button class="tab-btn" data-tab="inventory" type="button">Inventory</button>
    </nav>

    <section id="tab-buildings" class="tab-panel active">
      <div id="buildings-list" class="card-list"></div>
    </section>

    <section id="tab-workers" class="tab-panel">
      <div id="player-panel" class="card-list"></div>
      <div id="workers-list" class="card-list"></div>
    </section>

    <section id="tab-inventory" class="tab-panel">
      <div id="inventory-list" class="card-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
