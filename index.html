<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheat Incremental</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Wheat Incremental</h1>

    <section class="turn-panel">
      <div class="turn-counter">
        Turn <span id="current-turn">1</span> / <span id="turn-limit">80</span>
      </div>
      <button id="pass-turn" type="button">Pass Turn</button>
      <p id="turn-message" class="turn-message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
